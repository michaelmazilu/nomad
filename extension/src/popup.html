<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nomad</title>
    <style>
      :root {
        color-scheme: dark;
        --paper: #edf0f5;
        --panel: rgba(255, 255, 255, 0.17);
        --panel-strong: rgba(255, 255, 255, 0.26);
        --panel-soft: rgba(255, 255, 255, 0.11);
        --ink: #f8fafc;
        --muted: rgba(248, 250, 252, 0.68);
        --faint: rgba(255, 255, 255, 0.13);
        --line: rgba(255, 255, 255, 0.22);
        --strong: #ffffff;
        --bg-x: 50%;
        --bg-y: 18%;
        --drift-x: 0px;
        --drift-y: 0px;
        --glass-glow: rgba(255, 255, 255, 0.28);
        --glass-shadow: rgba(3, 7, 18, 0.34);
        --green: #8ef0b2;
        --red: #ff9b8d;
        --warn: #ffd486;
        --display: Georgia, "Times New Roman", Times, serif;
        --sans:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
          ui-sans-serif, system-ui, sans-serif;
        --mono:
          "SFMono-Regular", "Roboto Mono", Menlo, Monaco, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        width: 420px;
        min-width: 420px;
        min-height: 100%;
        background: #101417;
      }

      body {
        width: 420px;
        min-width: 420px;
        min-height: 100vh;
        max-height: 680px;
        margin: 0;
        overflow-y: auto;
        background:
          linear-gradient(
            180deg,
            rgba(4, 8, 12, 0.08) 0%,
            rgba(4, 8, 12, 0.14) 42%,
            rgba(4, 8, 12, 0.36) 100%
          ),
          url("/nomad-mountain-lake.jpg") center / cover no-repeat,
          #101417;
        color: var(--ink);
        font: 13px/1.5 var(--sans);
        letter-spacing: 0;
        text-rendering: geometricPrecision;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
        letter-spacing: 0;
      }

      .shell {
        position: relative;
        isolation: isolate;
        width: 420px;
        margin: 0;
        padding: 18px;
        min-height: max(680px, 100vh);
      }

      .shell::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
        opacity: 0.78;
        transform: translate3d(var(--drift-x), var(--drift-y), 0);
        filter: saturate(1.08);
        background:
          radial-gradient(
            circle at var(--bg-x) var(--bg-y),
            rgba(255, 255, 255, 0.2),
            rgba(255, 255, 255, 0) 28%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.06),
            rgba(255, 255, 255, 0) 36%,
            rgba(0, 0, 0, 0.24)
          );
      }

      .shell::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.62;
        background: linear-gradient(
          155deg,
          rgba(255, 255, 255, 0.2),
          rgba(255, 255, 255, 0) 24% 74%,
          rgba(0, 0, 0, 0.2)
        );
      }

      .masthead {
        padding: 6px 0 20px;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font: 500 28px/1 var(--display);
      }

      .grid {
        display: grid;
        gap: 10px;
      }

      .panel {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow:
          0 24px 70px var(--glass-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.48),
          inset 0 -1px 0 rgba(0, 0, 0, 0.22),
          0 0 24px rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(28px) saturate(1.45);
        -webkit-backdrop-filter: blur(28px) saturate(1.45);
        transition:
          transform 260ms cubic-bezier(0.23, 1, 0.32, 1),
          border-color 260ms ease,
          box-shadow 260ms ease;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.28),
          rgba(255, 255, 255, 0.07) 42%,
          rgba(0, 0, 0, 0.05) 100%
        );
      }

      .panel::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: 21px;
        pointer-events: none;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0) 54%,
          rgba(0, 0, 0, 0.08)
        );
      }

      .panel:hover {
        border-color: rgba(255, 255, 255, 0.34);
        box-shadow:
          0 26px 74px rgba(3, 7, 18, 0.38),
          inset 0 1px 0 rgba(255, 255, 255, 0.56),
          inset 0 -1px 0 rgba(0, 0, 0, 0.22),
          0 0 30px rgba(255, 255, 255, 0.1);
      }

      .panel-body {
        position: relative;
        z-index: 1;
        padding: 14px;
      }

      .panel-head,
      .wallet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      h2 {
        margin: 0;
        color: var(--strong);
        font-size: 13px;
        font-weight: 650;
        letter-spacing: -0.01em;
      }

      .tag {
        color: var(--muted);
        font-size: 11px;
        font-weight: 560;
      }

      .field {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .field:first-child {
        margin-top: 0;
      }

      label,
      .label {
        color: var(--strong);
        font-size: 12px;
        font-weight: 620;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 14px;
        outline: none;
        background: rgba(255, 255, 255, 0.13);
        color: var(--ink);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -1px 0 rgba(0, 0, 0, 0.16);
      }

      input::placeholder,
      textarea::placeholder {
        color: rgba(248, 250, 252, 0.42);
      }

      select option {
        color: #111827;
        background: #f8fafc;
      }

      input,
      select {
        min-height: 38px;
        padding: 8px 12px;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
        padding: 11px 12px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(255, 255, 255, 0.44);
        box-shadow:
          0 0 0 4px rgba(255, 255, 255, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -1px 0 rgba(0, 0, 0, 0.16);
      }

      button {
        min-height: 34px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 999px;
        padding: 7px 14px;
        color: #ffffff;
        background: rgba(255, 255, 255, 0.16);
        cursor: pointer;
        white-space: nowrap;
        box-shadow:
          0 10px 26px rgba(3, 7, 18, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.34),
          inset 0 -1px 0 rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(22px) saturate(1.35);
        -webkit-backdrop-filter: blur(22px) saturate(1.35);
        transition:
          transform 180ms cubic-bezier(0.23, 1, 0.32, 1),
          background 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      button:hover {
        border-color: rgba(255, 255, 255, 0.42);
        background: rgba(255, 255, 255, 0.22);
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(1px) scale(0.97);
      }

      button.secondary {
        color: var(--ink);
        border-color: rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.11);
      }

      button.secondary:hover {
        border-color: rgba(255, 255, 255, 0.36);
        background: rgba(255, 255, 255, 0.18);
      }

      button.danger {
        border-color: rgba(255, 155, 141, 0.36);
        background: rgba(255, 93, 80, 0.3);
      }

      .dev-skip {
        display: block;
        width: fit-content;
        min-height: 0;
        margin: 12px auto 0;
        border: 0;
        border-radius: 0;
        padding: 0;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
        font-weight: 560;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .dev-skip:hover {
        color: var(--strong);
        background: transparent;
        transform: none;
      }

      .wallet-gate {
        position: relative;
        overflow: hidden;
        margin-top: 4px;
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.36);
        border-radius: 44px;
        background: rgba(255, 255, 255, 0.16);
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.58),
          inset 0 -1px 0 rgba(0, 0, 0, 0.24),
          0 0 0 1px rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(34px) saturate(1.45);
        -webkit-backdrop-filter: blur(34px) saturate(1.45);
      }

      .wallet-gate::before {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 42px;
        pointer-events: none;
        background: linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.34),
          rgba(255, 255, 255, 0.05) 48%,
          rgba(0, 0, 0, 0.14)
        );
      }

      .wallet-gate > * {
        position: relative;
        z-index: 1;
      }

      .phantom-bar {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 88px;
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 999px;
        padding: 12px 14px;
        color: #fff;
        background:
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.28),
            rgba(255, 255, 255, 0.04) 56%,
            rgba(0, 0, 0, 0.12)
          ),
          rgba(255, 255, 255, 0.15);
        box-shadow:
          0 18px 42px rgba(0, 0, 0, 0.22),
          inset 0 2px 4px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.58),
          inset 0 -1px 0 rgba(0, 0, 0, 0.2),
          0 0 24px rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(30px) saturate(1.55);
        -webkit-backdrop-filter: blur(30px) saturate(1.55);
        transition:
          background 220ms ease,
          border-color 220ms ease,
          box-shadow 220ms ease,
          transform 220ms cubic-bezier(0.23, 1, 0.32, 1);
      }

      .phantom-bar::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        background: radial-gradient(
          circle at var(--button-x, 50%) var(--button-y, 50%),
          rgba(255, 255, 255, 0.42),
          rgba(255, 255, 255, 0.12) 34%,
          transparent 58%
        );
        opacity: 0;
        transition: opacity 180ms ease;
      }

      .phantom-bar:hover {
        border-color: rgba(255, 255, 255, 0.58);
        background:
          linear-gradient(
            135deg,
            rgba(255, 255, 255, 0.34),
            rgba(255, 255, 255, 0.07) 56%,
            rgba(0, 0, 0, 0.1)
          ),
          rgba(255, 255, 255, 0.2);
        box-shadow:
          0 20px 48px rgba(0, 0, 0, 0.28),
          inset 0 2px 4px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.66),
          inset 0 -1px 0 rgba(0, 0, 0, 0.18),
          0 0 30px rgba(255, 255, 255, 0.18);
        transform: translateY(-2px) scale(1.006);
      }

      .phantom-bar:hover::before {
        opacity: 1;
      }

      .phantom-bar:disabled {
        cursor: wait;
        opacity: 1;
        transform: none;
      }

      .phantom-bar[data-state="securing"],
      .phantom-bar[data-state="verifying"],
      .phantom-bar[data-state="ready"] {
        border-color: rgba(255, 255, 255, 0.68);
        background:
          linear-gradient(
            120deg,
            rgba(255, 255, 255, 0.3),
            rgba(255, 255, 255, 0.08) 48%,
            rgba(8, 15, 20, 0.18)
          ),
          rgba(255, 255, 255, 0.13);
        box-shadow:
          0 20px 52px rgba(3, 7, 18, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.62),
          0 0 34px rgba(255, 255, 255, 0.18);
      }

      .phantom-bar[data-state="ready"] {
        border-color: rgba(255, 255, 255, 0.82);
        box-shadow:
          0 20px 52px rgba(3, 7, 18, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.68),
          0 0 38px rgba(255, 255, 255, 0.24);
      }

      .phantom-left {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-width: 0;
      }

      .phantom-logo {
        position: relative;
        z-index: 2;
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.24));
      }

      .phantom-signal {
        position: relative;
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        flex: 0 0 auto;
      }

      .phantom-signal-ring {
        position: absolute;
        inset: 3px;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 50%;
        opacity: 0;
        pointer-events: none;
      }

      .phantom-name {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .phantom-progress {
        position: absolute;
        right: 17%;
        bottom: 12px;
        left: 17%;
        height: 2px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        opacity: 0;
      }

      .phantom-progress::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.32),
          #fff 58%,
          rgba(255, 255, 255, 0.62)
        );
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.78);
        transform: scaleX(var(--phantom-progress, 0));
        transform-origin: left;
        transition: transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .phantom-bar[data-state="securing"] .phantom-progress,
      .phantom-bar[data-state="verifying"] .phantom-progress,
      .phantom-bar[data-state="ready"] .phantom-progress {
        opacity: 1;
      }

      .phantom-bar[data-state="securing"] {
        --phantom-progress: 0.32;
      }

      .phantom-bar[data-state="verifying"] {
        --phantom-progress: 0.72;
      }

      .phantom-bar[data-state="ready"] {
        --phantom-progress: 1;
      }

      .phantom-bar[data-state="securing"] .phantom-signal-ring,
      .phantom-bar[data-state="verifying"] .phantom-signal-ring {
        animation: phantom-signal 850ms ease-out infinite;
      }

      .phantom-bar[data-state="securing"] .phantom-signal-ring:last-child,
      .phantom-bar[data-state="verifying"] .phantom-signal-ring:last-child {
        animation-delay: 280ms;
      }

      .phantom-bar[data-state="ready"] .phantom-logo {
        animation: phantom-ready 360ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes phantom-signal {
        0% {
          opacity: 0.75;
          transform: scale(0.72);
        }
        100% {
          opacity: 0;
          transform: scale(1.75);
        }
      }

      @keyframes phantom-ready {
        0% {
          transform: scale(0.82) rotate(-8deg);
        }
        65% {
          transform: scale(1.12) rotate(3deg);
        }
        100% {
          transform: scale(1) rotate(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .phantom-signal-ring,
        .phantom-logo {
          animation: none !important;
        }

        .phantom-progress::after {
          transition-duration: 0ms;
        }
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 11px;
      }

      .readout {
        display: grid;
        gap: 4px;
        min-width: 0;
        padding: 11px;
        border: 1px solid var(--faint);
        border-radius: 15px;
        background: var(--panel-soft);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          inset 0 -1px 0 rgba(0, 0, 0, 0.12);
      }

      .readout + .readout {
        margin-top: 8px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 10px;
        font-weight: 650;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      code {
        color: rgba(255, 255, 255, 0.92);
        font-family: var(--mono);
        font-size: 12px;
        word-break: break-all;
      }

      .balance {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 0;
        margin-top: 9px;
        padding-top: 9px;
        border-top: 1px solid var(--faint);
      }

      .hint,
      #ownerWarn {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      #ownerWarn:not(:empty) {
        color: var(--warn);
      }

      .status {
        display: none;
        margin-top: 10px;
        padding: 10px;
        border-radius: 15px;
        border: 1px solid currentColor;
        font-weight: 650;
      }

      .status.pending {
        display: block;
        color: var(--warn);
        background: rgba(255, 212, 134, 0.12);
      }

      .status.ok {
        display: block;
        color: var(--green);
        background: rgba(142, 240, 178, 0.1);
      }

      .status.error {
        display: block;
        color: var(--red);
        background: rgba(255, 155, 141, 0.1);
      }

      .scope-readout {
        margin-top: 11px;
      }

      .verdict {
        display: none;
        margin-top: 11px;
        padding: 11px;
        border-radius: 15px;
        border: 1px solid currentColor;
        font-weight: 700;
      }

      .verdict.ok {
        color: var(--green);
        background: rgba(142, 240, 178, 0.1);
      }

      .verdict.deny {
        color: var(--red);
        background: rgba(255, 155, 141, 0.1);
      }

      .verdict.warn {
        color: var(--warn);
        background: rgba(255, 212, 134, 0.12);
      }

      .liquid-release {
        animation: liquidRelease 840ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes liquidRelease {
        0% {
          transform: translateY(1px) scale(0.97);
        }
        16% {
          transform: translateY(-3px) scale(1.04, 0.98);
        }
        32% {
          transform: translateY(1px) scale(0.98, 1.02);
        }
        52% {
          transform: translateY(-1px) scale(1.01, 0.995);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }

      pre {
        max-height: 112px;
        margin: 10px 0 0;
        overflow: auto;
        white-space: pre-wrap;
      }

      .activity {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
      }

      .activity:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <h1 id="nomad-title">Nomad</h1>
      </header>

      <select id="ownerMode" hidden aria-hidden="true">
        <option value="phantom" selected>Phantom</option>
      </select>
      <select id="cluster" hidden aria-hidden="true">
        <option value="localnet" selected>localnet</option>
      </select>

      <section id="walletGate" class="wallet-gate">
        <div class="wallet-head">
          <h2>Connect wallet</h2>
        </div>
        <button
          id="connectOwner"
          class="phantom-bar"
          aria-label="Connect Phantom wallet"
        >
          <span class="phantom-left">
            <span class="phantom-signal">
              <span class="phantom-signal-ring"></span>
              <span class="phantom-signal-ring"></span>
              <svg
                class="phantom-logo"
                viewBox="0 0 32 32"
                role="img"
                aria-label="Phantom logo"
              >
                <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,.18)" />
                <path
                  d="M8.2 18.3c0-6.1 4.4-10.1 9.8-10.1 5 0 8.1 3.6 8.1 8.6 0 4.7-2.6 7.1-5.1 7.1-1.6 0-2.4-.8-2.8-1.8-.8 1.3-2.2 2.4-4.1 2.4-3.4 0-5.9-2.2-5.9-6.2Z"
                  fill="#fff"
                />
                <circle cx="18.9" cy="15.1" r="1.1" fill="#101417" />
                <circle cx="23.1" cy="15.1" r="1.1" fill="#101417" />
              </svg>
            </span>
            <span class="phantom-name">Phantom</span>
          </span>
          <span class="phantom-progress" aria-hidden="true"></span>
        </button>
        <button id="skipWallet" class="dev-skip">Skip for dev</button>
        <p id="ownerWarn"></p>
        <p id="ownerHint" class="hint"></p>
      </section>

      <div id="postWallet" class="grid" hidden>
        <section class="panel">
          <div class="panel-body">
            <div class="panel-head">
              <h2>Owner</h2>
              <span class="tag">Phantom</span>
            </div>
            <div class="readout">
              <span class="eyebrow">Wallet</span>
              <code id="ownerPubkey">none</code>
            </div>
            <div class="balance">
              <span class="eyebrow">Balance</span>
              <span><code id="ownerBalance">0.0000</code> SOL</span>
            </div>
          </div>
        </section>

        <section id="agentGate" class="panel">
          <div class="panel-body">
            <div class="panel-head">
              <h2>Sync agents</h2>
              <span class="tag">next step</span>
            </div>
            <div class="readout">
              <span class="eyebrow">Agent public key</span>
              <code id="agentPubkey">none</code>
            </div>
            <div class="actions">
              <button id="ensureAgent">Sync agents</button>
            </div>
          </div>
        </section>

        <div id="workspace" class="grid" hidden>
          <section class="panel">
            <div class="panel-body">
              <div class="panel-head">
                <h2>Agent</h2>
                <span class="tag">identity</span>
              </div>
              <div class="readout">
                <span class="eyebrow">Agent public key</span>
                <code id="workspaceAgentPubkey">none</code>
              </div>
              <div class="actions">
                <button id="resyncAgent" class="secondary">Sync agents</button>
                <button id="airdrop" class="secondary">Airdrop</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-body">
              <div class="panel-head">
                <h2>Passport</h2>
                <span class="tag">permissions</span>
              </div>
              <div class="field">
                <label for="label">Label</label>
                <input
                  id="label"
                  type="text"
                  maxlength="64"
                  placeholder="My Agent"
                />
              </div>
              <div class="field">
                <label for="permissions">Scopes</label>
                <textarea
                  id="permissions"
                  rows="4"
                  placeholder="calendar.read&#10;calendar.*"
                ></textarea>
              </div>
              <div class="actions">
                <button id="createPassport">Create</button>
                <button id="updatePassport" class="secondary">Update</button>
                <button id="revokePassport" class="danger">Revoke</button>
                <button id="loadPassport" class="secondary">
                  Load from chain
                </button>
              </div>
              <div id="txStatus" class="status"></div>
              <div class="readout scope-readout">
                <span class="eyebrow">On-chain scopes</span>
                <code id="onchainScopes">none</code>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-body">
              <div class="panel-head">
                <h2>Verify</h2>
                <span class="tag">signed action</span>
              </div>
              <div class="field">
                <label for="action">Action</label>
                <input id="action" type="text" placeholder="calendar.read" />
              </div>
              <div class="actions">
                <button id="attemptAction">Attempt</button>
              </div>
              <div id="verdict" class="verdict"></div>
            </div>
          </section>
        </div>
      </div>

      <pre id="log" class="activity"></pre>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
